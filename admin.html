<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="MoeMail 邮箱管理页面">
  <title>邮箱管理页面</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-page">
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MOEMAIL 管理页面</p>
        <h1>随机邮箱管理</h1>
      </div>
      <div class="topbar-actions">
        <span id="connectionStatus" class="status-pill">正在检查连接…</span>
        <button id="refreshAllButton" class="button ghost" type="button">刷新</button>
      </div>
    </header>

    <main class="admin-layout">
      <aside class="panel inbox-panel">
        <div class="panel-header create-header">
          <div>
            <p class="label">管理邮箱</p>
            <h2>我的邮箱</h2>
          </div>
          <button id="createInboxButton" class="button primary" type="button">＋ 创建随机邮箱</button>
        </div>

        <section id="createResult" class="create-result hidden" aria-live="polite">
          <div class="result-heading">
            <div>
              <p class="label success-label">创建成功</p>
              <h3>邮箱和专属链接已生成</h3>
            </div>
            <button id="closeCreateResultButton" class="result-close" type="button" aria-label="关闭">×</button>
          </div>
          <div class="result-field">
            <span>邮箱地址</span>
            <div class="result-value-row">
              <code id="createdEmailName"></code>
              <button id="copyCreatedEmailButton" class="button ghost compact" type="button">复制</button>
            </div>
          </div>
          <div class="result-field">
            <span>独立查看邮件链接</span>
            <input id="createdInboxUrl" type="text" readonly aria-label="独立查看邮件链接">
            <div class="result-actions">
              <button id="copyCreatedUrlButton" class="button ghost" type="button">复制链接</button>
              <a id="openCreatedUrlButton" class="button primary link-button" href="#" target="_blank" rel="noopener noreferrer">打开专属页面</a>
            </div>
          </div>
        </section>

        <div id="inboxList" class="inbox-list" aria-live="polite"></div>
      </aside>

      <section class="panel messages-panel">
        <div class="panel-header">
          <div class="truncate">
            <p class="label">当前邮箱</p>
            <h2 id="selectedInboxTitle">请选择一个邮箱</h2>
          </div>
          <div class="header-actions">
            <button id="copyAddressButton" class="button ghost compact hidden" type="button">复制地址</button>
            <button id="copyViewerUrlButton" class="button ghost compact hidden" type="button">复制专属链接</button>
          </div>
        </div>
        <div class="toolbar">
          <input id="messageSearchInput" type="search" placeholder="搜索发件人或主题" aria-label="搜索邮件">
          <button id="refreshMessagesButton" class="button ghost" type="button">刷新邮件</button>
        </div>
        <div id="messageList" class="message-list empty-state">
          <div><div class="empty-icon">✉</div><p>选择一个邮箱后查看邮件</p></div>
        </div>
      </section>

      <section class="panel viewer-panel">
        <div id="messageViewer" class="viewer-empty">
          <div><div class="empty-icon">⌁</div><p>点击一封邮件查看正文</p></div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/admin.js"></script>
</body>
</html>
